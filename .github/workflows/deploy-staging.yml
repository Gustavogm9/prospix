name: Staging Validation

on:
  push:
    branches: [staging]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.15.0'
  NEXT_PUBLIC_SUPABASE_URL: 'https://ci.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-anon-key'
  SUPABASE_SERVICE_ROLE_KEY: 'ci-service-role-key'
  NEXT_PUBLIC_API_URL: 'http://localhost:3000'
  NEXT_PUBLIC_WEB_URL: 'http://localhost:3000'

jobs:
  staging-validation:
    name: Validate staging release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Deployment ownership
        run: |
          echo "Staging web deployment is handled by the configured frontend hosting provider."
          echo "Supabase dependencies are deployed via Supabase CLI."
