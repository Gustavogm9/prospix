name: Staging Validation

on:
  push:
    branches: [staging]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.15.0'

jobs:
  staging-validation:
    name: Validate staging release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Deployment ownership
        run: |
          echo "Staging web deployment is handled by the configured frontend hosting provider."
          echo "Supabase dependencies are deployed via Supabase CLI."
