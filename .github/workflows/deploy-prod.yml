name: Deploy Production

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.15.0'

jobs:
  ci-check:
    name: Run CI validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prospix
          POSTGRES_PASSWORD: prospix_dev
          POSTGRES_DB: prospix_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
    env:
      DATABASE_URL: postgresql://prospix:prospix_dev@localhost:5432/prospix_test
      REDIS_URL: redis://localhost:6379
      SECRETS_ENCRYPTION_KEY: dGVzdF9rZXlfMzJfYnl0ZXNfbG9uZ19wYWRfeHh4eA==
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @prospix/api db:generate
      - run: pnpm --filter @prospix/api db:migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:multi-tenant

  deploy-prod:
    name: Deploy to Railway (Production Blue/Green)
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Pre-deploy Database Backup Snapshot
        run: |
          echo "Triggering PG Database Backup Snapshot..."
          # production backup pipeline triggers here

      - name: Run Production Database Migrations
        run: |
          echo "Applying migrations to Production Database..."
          pnpm --filter @prospix/api db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PROD_URL }}

      - name: Deploy to Railway (Blue/Green rolling release)
        run: |
          railway up --service=api-prod
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD_TOKEN }}

      - name: Run Production Liveness and Readiness Smoke Tests
        run: |
          echo "Running Production Liveness & Readiness Checks..."
          curl -f -s https://api.prospix.com.br/health || exit 1
          curl -f -s https://api.prospix.com.br/ready || exit 1
          echo "Production Smoke tests passed!"
