name: Production Validation

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.15.0'

jobs:
  production-validation:
    name: Validate production release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Deployment ownership
        run: |
          echo "Web production deployment is handled by the Vercel GitHub integration."
          echo "Database migrations and Supabase Edge Functions are deployed via Supabase CLI."
