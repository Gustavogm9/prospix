name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.15.0'

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .turbo
          key: ${{ runner.os }}-deps-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  openapi-drift:
    name: OpenAPI ↔ shared-types drift gate (AUD-P2-016)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify shared-types is in sync with docs/api/openapi.yaml
        run: pnpm --filter @prospix/shared-types verify:openapi

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prospix
          POSTGRES_PASSWORD: prospix_dev
          POSTGRES_DB: prospix_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://prospix:prospix_dev@localhost:5432/prospix_test?schema=public
      REDIS_URL: redis://localhost:6379
      SECRETS_ENCRYPTION_KEY: dGVzdF9rZXlfMzJfYnl0ZXNfbG9uZ19wYWRfeHh4eA==
      EVOLUTION_GUILDS_API_KEY: test-evolution-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify PostgreSQL is reachable
        run: |
          for attempt in {1..30}; do
            if timeout 1 bash -c '</dev/tcp/localhost/5432' 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::PostgreSQL service did not become reachable on localhost:5432"
          exit 1
      - name: Require committed Prisma migrations
        run: |
          if [ ! -d apps/api/prisma/migrations ]; then
            echo "::error::apps/api/prisma/migrations is required before DB-backed multi-tenant tests can run in CI."
            exit 1
          fi
      - name: Generate Prisma client
        run: pnpm --filter @prospix/api db:generate
      - name: Apply migrations + RLS
        run: pnpm --filter @prospix/api db:migrate
      - name: Seed database
        run: pnpm --filter @prospix/api db:seed
      - run: pnpm test
      - name: Run audit DB/Redis-backed tests without skips
        env:
          AUDIT_REQUIRE_DB: '1'
          AUDIT_REQUIRE_REDIS: '1'
          DATABASE_URL: postgresql://prospix_app:prospix_dev@localhost:5432/prospix_test?schema=public
        run: |
          pnpm --filter @prospix/api exec vitest run tests/multi-tenant tests/integration/auth-admin-login.rls-db.test.ts tests/integration/auth-refresh-revoke.redis-db.test.ts tests/integration/evolution-idempotency.redis-db.test.ts tests/integration/queue-dlq.redis.test.ts src/lib/queue.test.ts src/workers/index.test.ts --reporter=default --reporter=json --outputFile=../../audit-db-results.json
          node - <<'NODE'
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('audit-db-results.json', 'utf8'));
          const skipped = Number(results.numPendingTests ?? 0) + Number(results.numTodoTests ?? 0);
          if (skipped > 0) {
            console.error(`::error::audit DB/Redis suite reported ${skipped} skipped/todo test(s). DB-backed RLS/queue evidence cannot contain skips.`);
            process.exit(1);
          }
          NODE

  e2e-smoke:
    name: E2E smoke (Playwright · landing/web/admin)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, openapi-drift]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium + system deps
        run: pnpm exec playwright install --with-deps chromium
      - name: Run smoke E2E (landing + web + admin)
        run: pnpm test:e2e:smoke
        env:
          CI: '1'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, openapi-drift, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit npm packages
        run: pnpm audit --audit-level=high
        continue-on-error: true # warning, not blocking
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
