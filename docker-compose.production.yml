## docker-compose.production.yml
## Extensão para produção — rodar com:
##   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
##
## NOTA: PostgreSQL agora é gerenciado pelo Supabase (cloud).
##       Apenas Redis é self-hosted. API e Workers conectam via SUPABASE_URL.

services:
  redis:
    image: redis:7-alpine
    container_name: prospix-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
        --maxmemory 1gb
        --maxmemory-policy noeviction
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --tcp-keepalive 60
        --timeout 300
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    restart: unless-stopped

  ## API principal — recebe requests HTTP
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prospix-api
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      # DB agora é Supabase (definido em .env.production):
      # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WORKERS_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  ## Workers — processos separados para background jobs
  workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prospix-workers
    env_file: .env.production
    environment:
      NODE_ENV: production
      # DB agora é Supabase (definido em .env.production)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WORKERS_ENABLED: "true"
    command: ["node", "dist/workers/index.js"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const r=require('ioredis');const c=new r('redis://:${REDIS_PASSWORD}@redis:6379');c.ping().then(()=>{c.quit();process.exit(0)}).catch(()=>process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

volumes:
  redis_data:
