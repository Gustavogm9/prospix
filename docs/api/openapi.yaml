openapi: 3.1.0
info:
  title: Prospix API
  description: |
    API multi-tenant da plataforma de prospecção inteligente Prospix.
    Primeiro tenant: Giovane Carrara (MetLife · SJRP).

    ## Autenticação
    Todas as rotas (exceto `/auth/*` e `/webhooks/*`) exigem JWT Bearer + header `X-Tenant-Id`.
    O `X-Tenant-Id` é validado contra o JWT — mismatch retorna 403.

    ## Multi-tenancy
    Todo dado é isolado por tenant via RLS no PostgreSQL. Um tenant nunca vê dados de outro.

    ## Rate limits
    - `/auth/*`: 10 req/min por IP
    - `/tenant/*` GET: 600 req/min por tenant
    - `/tenant/*` POST/PATCH: 60 req/min por tenant
  version: 1.0.0
  contact:
    name: Guilds
    email: gustavo.macedo@guilds.com.br

servers:
  - url: https://api.prospix.com.br/v1
    description: Produção
  - url: https://api-staging.prospix.com.br/v1
    description: Staging
  - url: http://localhost:3000/v1
    description: Local dev

tags:
  - name: Auth
    description: Autenticação via magic link
  - name: Leads
    description: Gestão de leads capturados
  - name: Conversations
    description: Conversas e mensagens WhatsApp
  - name: Meetings
    description: Reuniões agendadas
  - name: Campaigns
    description: Campanhas de prospecção
  - name: Scripts
    description: Roteiros da IA
  - name: Dashboard
    description: Métricas e KPIs
  - name: Settings
    description: Configurações e integrações
  - name: Notifications
    description: Notificações do usuário
  - name: LGPD
    description: Operações de privacidade
  - name: Admin
    description: Super-admin Guilds (role guilds_admin)
  - name: Webhooks
    description: Recebimento de eventos externos

# =============================================================================
security:
  - bearerAuth: []
    tenantHeader: []

paths:

  # ===========================================================================
  # AUTH
  # ===========================================================================
  /auth/magic-link:
    post:
      tags: [Auth]
      summary: Solicita magic link
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                whatsapp: { type: string, example: "+5517998764422" }
                email: { type: string, format: email }
              oneOf:
                - required: [whatsapp]
                - required: [email]
      responses:
        '200':
          description: Link enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sent_to: { type: string, enum: [whatsapp, email] }
                      expires_in: { type: integer, example: 600 }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/callback:
    get:
      tags: [Auth]
      summary: Callback do magic link (troca token por JWT)
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token: { type: string }
                      refresh_token: { type: string }
                      user: { $ref: '#/components/schemas/User' }
                      tenant: { $ref: '#/components/schemas/Tenant' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renova access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token: { type: string }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Encerra sessão (revoga JWT)
      responses:
        '204': { description: Logout efetuado }

  # ===========================================================================
  # INVITATIONS (cadastro com código · ver PRD anexo N)
  # ===========================================================================
  /auth/invitations/verify:
    post:
      tags: [Auth]
      summary: Verifica se código de convite é válido (sem consumir)
      x-prospix-response-shape: data-object
      x-prospix-error-shape: flat-error
      security: []
      description: |
        Rate limit 5 req/min por IP (anti brute-force).
        Em erro retorna mensagem genérica · `code` específico só visível no log interno.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^PRSPX-[A-Z0-9]{4}-[A-Z0-9]{4}$'
                  example: 'PRSPX-A8K2-9F4M'
      responses:
        '200':
          description: Código válido
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tenant_name: { type: string, example: 'Giovane Carrara · MetLife · SJRP' }
                      role: { type: string, enum: [OWNER, ASSISTANT] }
        '404':
          description: INVITATION_INVALID
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '410':
          description: INVITATION_EXPIRED ou INVITATION_ALREADY_USED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/invitations/redeem:
    post:
      tags: [Auth]
      summary: Consome código de convite + cria owner + envia magic link
      x-prospix-response-shape: data-object
      x-prospix-error-shape: flat-error
      security: []
      description: |
        Rate limit 3 req/min por IP.
        Marca invitation como usado e dispara magic link via WhatsApp do owner.
        Operação atômica: ou cria tudo, ou nada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, user, accept_terms]
              properties:
                code:
                  type: string
                  pattern: '^PRSPX-[A-Z0-9]{4}-[A-Z0-9]{4}$'
                user:
                  type: object
                  required: [name, email, whatsapp]
                  properties:
                    name: { type: string, maxLength: 255 }
                    email: { type: string, format: email }
                    whatsapp: { type: string, example: '+5517998764422' }
                    susep: { type: string, nullable: true }
                    city: { type: string, nullable: true }
                accept_terms:
                  type: boolean
                  description: Aceite LGPD + Termos de uso (obrigatório true)
      responses:
        '201':
          description: Cadastrado · magic link enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user_id: { type: string, format: uuid }
                      tenant_id: { type: string, format: uuid }
                      magic_link_sent: { type: boolean, example: true }
                      sent_to: { type: string, example: 'whatsapp' }
        '410':
          description: Código expirado ou já usado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/admin-login:
    post:
      tags: [Auth]
      summary: Login administrativo Guilds
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 1 }
      responses:
        '200':
          description: Sessão administrativa criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  user: { type: object }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Credenciais administrativas inválidas }

  /admin/tenants/{id}/invitations:
    get:
      tags: [Admin]
      summary: Lista invitations do tenant
      x-prospix-response-shape: data-array
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Invitation' }
    post:
      tags: [Admin]
      summary: Gera novo código de convite (admin Guilds)
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_days: { type: integer, default: 14, minimum: 1, maximum: 60 }
                role: { type: string, enum: [OWNER, ASSISTANT], default: OWNER }
                notes: { type: string, nullable: true }
      responses:
        '201':
          description: Código criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'

  /admin/tenants/{id}/invitations/{invitationId}:
    delete:
      tags: [Admin]
      summary: Revoga código de convite ativo
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: invitationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Revogado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invitation' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # LEADS
  # ===========================================================================
  /tenant/leads:
    get:
      tags: [Leads]
      summary: Lista leads
      x-prospix-response-shape: data-array
      x-prospix-error-shape: flat-error
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/LeadStatus' } }
        - { name: fit_score_gte, in: query, schema: { type: number, minimum: 0, maximum: 10 } }
        - { name: fit_score_lte, in: query, schema: { type: number, minimum: 0, maximum: 10 } }
        - { name: profession, in: query, schema: { $ref: '#/components/schemas/Profession' } }
        - { name: campaign_id, in: query, schema: { type: string, format: uuid } }
        - { name: created_after, in: query, schema: { type: string, format: date-time } }
        - { name: search, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, example: "-fit_score,created_at" } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Lead' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    post:
      tags: [Leads]
      summary: Cria lead manualmente
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LeadCreate' }
      responses:
        '201':
          description: Lead criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Lead' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tenant/leads/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Leads]
      summary: Detalhe do lead (com mensagens, reunião, timeline)
      x-prospix-response-shape: raw-object
      responses:
        '200':
          description: Lead completo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LeadDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Leads]
      summary: Atualiza lead
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                pipeline_stage: { type: string }
                tags: { type: array, items: { type: string } }
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Lead' }
    delete:
      tags: [Leads]
      summary: Soft-delete (LGPD)
      x-prospix-response-shape: empty
      responses:
        '204': { description: Removido }

  /tenant/leads/{id}/optout:
    post:
      tags: [Leads]
      summary: Marca opt-out do lead
      x-prospix-response-shape: raw-object
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200': { description: Opt-out registrado }

  /tenant/leads/{id}/notes:
    post:
      tags: [Leads]
      summary: Adiciona anotação
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201': { description: Nota criada }
    get:
      tags: [Leads]
      summary: Lista anotações do lead
      x-prospix-response-shape: raw-array
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Lista }

  # ===========================================================================
  # CONVERSATIONS
  # ===========================================================================
  /tenant/conversations:
    get:
      tags: [Conversations]
      summary: Lista conversas ativas
      x-prospix-response-shape: raw-array
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [active, paused, escalated, closed] } }
        - { name: filter, in: query, schema: { type: string, enum: [hot, waiting, scheduled] } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Conversation' }

  /tenant/conversations/{id}/messages:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Conversations]
      summary: Mensagens da conversa (ordem cronológica)
      x-prospix-response-shape: raw-array
      responses:
        '200':
          description: Lista de mensagens
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Message' }
    post:
      tags: [Conversations]
      summary: Envia mensagem (só se user assumiu a conversa)
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
                send_via: { type: string, enum: [whatsapp], default: whatsapp }
      responses:
        '201':
          description: Mensagem enfileirada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '409':
          description: Conversa em modo IA — assuma antes de enviar

  /tenant/conversations/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Conversations]
      summary: Atualiza controle IA/humano da conversa
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [aiHandling]
              properties:
                aiHandling: { type: boolean }
      responses:
        '200':
          description: Conversa atualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '400': { description: Payload invalido }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # MEETINGS
  # ===========================================================================
  /tenant/meetings:
    get:
      tags: [Meetings]
      summary: Lista reuniões
      x-prospix-response-shape: data-array
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/MeetingStatus' } }
        - { name: scheduled_after, in: query, schema: { type: string, format: date-time } }
        - { name: scheduled_before, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Meeting' }

  /tenant/meetings/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Meetings]
      summary: Marca resultado pós-reunião
      x-prospix-response-shape: data-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { $ref: '#/components/schemas/MeetingStatus' }
                outcome: { type: string, enum: [CLOSED, SECOND_MEETING, NOT_INTERESTED, THINKING] }
                policy_value_cents: { type: integer, example: 487000 }
                commission_cents: { type: integer, example: 584400 }
                notes: { type: string }
                referrals_collected:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      whatsapp: { type: string }
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Meeting' }
        '400': { description: Payload invalido }
        '404': { $ref: '#/components/responses/NotFound' }

  /tenant/meetings/reschedule:
    post:
      tags: [Meetings]
      summary: Remarca reunião
      x-prospix-response-shape: data-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meetingId, newTime]
              properties:
                meetingId: { type: string, format: uuid }
                newTime: { type: string, format: date-time }
      responses:
        '201':
          description: Remarcada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Meeting' }
        '400': { description: Payload invalido }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # CAMPAIGNS
  # ===========================================================================
  /tenant/campaigns:
    get:
      tags: [Campaigns]
      summary: Lista campanhas
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Campaign' }
    post:
      tags: [Campaigns]
      summary: Cria campanha
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignCreate' }
      responses:
        '201':
          description: Criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Campaign' }

  /tenant/campaigns/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Campaigns]
      summary: Detalhe da campanha
      responses:
        '200':
          description: Campanha
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Campaign' }
    patch:
      tags: [Campaigns]
      summary: Atualiza campanha
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignCreate' }
      responses:
        '200': { description: Atualizada }
    delete:
      tags: [Campaigns]
      summary: Arquiva campanha
      x-prospix-response-shape: empty
      responses:
        '204': { description: Arquivada }

  /tenant/campaigns/{id}/pause:
    post:
      tags: [Campaigns]
      summary: Pausa campanha
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Pausada }

  /tenant/campaigns/{id}/resume:
    post:
      tags: [Campaigns]
      summary: Retoma campanha
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Retomada }

  # ===========================================================================
  # SCRIPTS
  # ===========================================================================
  /tenant/scripts:
    get:
      tags: [Scripts]
      summary: Lista roteiros do tenant
      x-prospix-response-shape: raw-array
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Script' }
    post:
      tags: [Scripts]
      summary: Cria roteiro do tenant
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseMessage]
              properties:
                name: { type: string }
                baseMessage: { type: string }
                variations:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      weight: { type: number, minimum: 0, maximum: 100 }
                      content: { type: string }
      responses:
        '201':
          description: Script criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Script' }
        '400': { description: Payload invalido }

  /tenant/scripts/simulate:
    post:
      tags: [Scripts]
      summary: Simula resposta de roteiro
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input, baseMessage]
              properties:
