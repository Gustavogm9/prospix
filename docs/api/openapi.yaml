                approved_by: { type: string, maxLength: 255 }
                reason: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Job removido
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      ok: { type: boolean }
                      purged_at: { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

