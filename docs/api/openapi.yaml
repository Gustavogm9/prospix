  # ===========================================================================
  # NOTIFICATIONS
  # ===========================================================================
  # LGPD · AUD-P2-033 (UX operacional para direitos do titular)
  # ===========================================================================
  /tenant/lgpd/requests:
    get:
      tags: [LGPD]
      summary: Lista solicitações LGPD do tenant
      description: |
        Retorna até 100 solicitações ordenadas por data desc.
        Inclui status, scope, downloadUrl (se COMPLETED) e timestamps.
      responses:
        '200':
          description: Lista de solicitações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/LgpdRequest' }
    post:
      tags: [LGPD]
      summary: Cria nova solicitação LGPD (art. 18)
      description: |
        Tipos suportados:
        - `EXPORT_DATA` · portabilidade (art. 18 V)
        - `DELETE_TENANT_DATA` · exclusão do tenant (art. 18 VI)
        - `DELETE_LEAD_DATA` · exclusão de lead específico (requer `scope.lead_whatsapp`)
        - `CORRECT_DATA` · correção (requer `scope.field`)
        - `CONFIRM_DATA` · confirmação da existência (art. 18 I)

        Rate limit: máximo 3 requests PENDING/PROCESSING simultâneos por tenant.
        SLA de resposta: 15 dias úteis (LGPD art. 19).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [EXPORT_DATA, DELETE_TENANT_DATA, DELETE_LEAD_DATA, CORRECT_DATA, CONFIRM_DATA]
                scope:
                  type: object
                  additionalProperties: true
                  description: |
                    Depende de `type`:
                    - DELETE_LEAD_DATA: `{ lead_whatsapp: string }`
                    - CORRECT_DATA: `{ field: string, oldValue?, newValue? }`
                    - EXPORT_DATA: `{ include?: ["leads","conversations","meetings","scripts"] }`
      responses:
        '202':
          description: Solicitação registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/LgpdRequest'
                      - type: object
                        properties:
                          sla:
                            type: object
                            properties:
                              message: { type: string }
                              estimated_resolution_days: { type: integer }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429':
          description: Rate limit (max 3 PENDING/PROCESSING simultâneos)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /tenant/lgpd/requests/{id}:
    get:
      tags: [LGPD]
      summary: Detalhe de uma solicitação LGPD
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Detalhe
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LgpdRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tenant/lgpd/requests/{id}/cancel:
    post:
      tags: [LGPD]
      summary: Cancela solicitação ainda PENDING
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Cancelada
