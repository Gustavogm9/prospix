              schema:
                type: object
                properties:
                  data: { type: object }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Admin]
      summary: Desativa template master
      x-prospix-response-shape: raw-object
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Desativado }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # WEBHOOKS
  # ===========================================================================
  /webhooks/evolution:
    post:
      tags: [Webhooks]
      summary: Dispatcher unificado da Evolution API
      x-prospix-response-shape: raw-object
      security: []
      parameters:
        - { name: x-evolution-signature, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: ACK rapido }
        '401': { description: HMAC invalido }

  /webhooks/evolution/inbound:
    post:
      tags: [Webhooks]
      summary: Mensagem recebida do lead (Evolution API)
      x-prospix-response-shape: raw-object
      security: []
      parameters:
        - { name: x-evolution-signature, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EvolutionInboundPayload' }
      responses:
        '200': { description: Enfileirado (ACK rápido) }
        '401': { description: HMAC inválido }

  /webhooks/evolution/status:
    post:
      tags: [Webhooks]
      summary: Status de delivery (Evolution API)
      x-prospix-response-shape: raw-object
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /webhooks/evolution/instance:
    post:
      tags: [Webhooks]
      summary: Status da instância (Evolution API)
      x-prospix-response-shape: raw-object
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /webhooks/asaas:
    post:
      tags: [Webhooks]
      summary: Eventos de billing (Asaas · MVP)
      x-prospix-response-shape: raw-object
      x-prospix-error-shape: flat-error
      security: []
      description: |
        Eventos recebidos:
        - PAYMENT_CREATED, PAYMENT_CONFIRMED, PAYMENT_RECEIVED
        - PAYMENT_OVERDUE (dispara régua de inadimplência)
        - PAYMENT_DELETED
        Validação por assinatura ASAAS_WEBHOOK_SECRET.
      parameters:
        - { name: asaas-access-token, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event, payment]
              properties:
                event: { type: string, example: 'PAYMENT_CONFIRMED' }
                payment:
                  type: object
                  properties:
                    id: { type: string }
                    customer: { type: string }
                    value: { type: number }
                    status: { type: string }
                    dueDate: { type: string, format: date }
                    billingType: { type: string, enum: [PIX, BOLETO, CREDIT_CARD] }
      responses:
        '200': { description: OK }
        '401': { description: Token inválido }

# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-Id

  responses:
    Unauthenticated:
      description: Token ausente ou inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Sem permissão (role ou tenant mismatch)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Recurso não encontrado neste tenant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Payload inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Limite de requisições excedido
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [UNAUTHENTICATED, UNAUTHORIZED, RESOURCE_NOT_FOUND, VALIDATION_ERROR, RATE_LIMITED, TENANT_QUOTA_EXCEEDED, EXTERNAL_SERVICE_DOWN, INTERNAL_ERROR]
            message: { type: string }
            details: { type: object }
            trace_id: { type: string }
        meta:
          type: object
          properties:
            request_id: { type: string }
            timestamp: { type: string, format: date-time }

    PaginatedResponse:
      type: object
      properties:
        pagination:
          type: object
          properties:
            next_cursor: { type: string, nullable: true }
            has_more: { type: boolean }
            total_estimate: { type: integer }

    LeadStatus:
      type: string
      enum: [captured, enriched, contacted, no_response, conversing, qualified, meeting_scheduled, closed_won, closed_lost, not_interested, lost_before_meeting, opted_out, archived, escalated_human]

    Profession:
      type: string
      enum: [doctor, lawyer, dentist, entrepreneur, engineer, architect, accountant, other]

    MeetingStatus:
      type: string
      enum: [SCHEDULED, CONFIRMED, HAPPENED, NO_SHOW, RESCHEDULED, CANCELLED]

    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        plan: { type: string }
        brand_primary_color: { type: string }

    TenantAdmin:
      allOf:
        - $ref: '#/components/schemas/Tenant'
        - type: object
          properties:
            status: { type: string }
            mrr_cents: { type: integer }
            go_live_at: { type: string, format: date-time }
            health: { type: string, enum: [green, yellow, red] }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [owner, assistant, guilds_admin] }
        name: { type: string }
        email: { type: string, format: email }
        whatsapp: { type: string }
        susep: { type: string }

    Lead:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        profession: { $ref: '#/components/schemas/Profession' }
        whatsapp: { type: string }
        whatsapp_valid: { type: boolean }
        fit_score: { type: number, minimum: 0, maximum: 10 }
        status: { $ref: '#/components/schemas/LeadStatus' }
        pipeline_stage: { type: string }
        source: { type: string }
        address: { type: object }
        created_at: { type: string, format: date-time }

    LeadCreate:
      type: object
      required: [whatsapp]
      properties:
        name: { type: string }
        whatsapp: { type: string }
        profession: { $ref: '#/components/schemas/Profession' }
        source: { type: string, default: manual }
        metadata: { type: object }

    LeadDetail:
      allOf:
        - $ref: '#/components/schemas/Lead'
        - type: object
          properties:
            recent_messages:
              type: array
              items: { $ref: '#/components/schemas/Message' }
            last_meeting: { $ref: '#/components/schemas/Meeting' }
            events:
              type: array
              items: { $ref: '#/components/schemas/LeadEvent' }
            health_profile: { type: object, nullable: true }

    Conversation:
      type: object
      properties:
        id: { type: string, format: uuid }
        lead_id: { type: string, format: uuid }
        lead_name: { type: string }
        status: { type: string, enum: [active, paused, escalated, closed] }
        ai_handling: { type: boolean }
        message_count: { type: integer }
        last_message_at: { type: string, format: date-time }
        last_message_preview: { type: string }

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        direction: { type: string, enum: [inbound, outbound] }
        sender: { type: string, enum: [ai, user, lead] }
        content: { type: string }
        delivery_status: { type: string, enum: [queued, sent, delivered, read, failed] }
        intent_detected: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Meeting:
      type: object
      properties:
        id: { type: string, format: uuid }
        lead_id: { type: string, format: uuid }
        lead_name: { type: string }
        scheduled_for: { type: string, format: date-time }
        duration_minutes: { type: integer }
        location: { type: string }
        status: { $ref: '#/components/schemas/MeetingStatus' }
        outcome: { type: string, nullable: true }
        attendees: { type: array, items: { type: object } }

    Campaign:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [draft, active, paused, archived] }
        profession: { $ref: '#/components/schemas/Profession' }
        cities: { type: array, items: { type: string } }
        daily_limit: { type: integer }
        total_captured: { type: integer }
        total_conversing: { type: integer }
        total_scheduled: { type: integer }

    CampaignCreate:
      type: object
      required: [name, profession, cities]
      properties:
        name: { type: string }
        profession: { $ref: '#/components/schemas/Profession' }
        cities: { type: array, items: { type: string } }
        neighborhoods: { type: array, items: { type: string } }
        daily_limit: { type: integer, default: 100 }
        hour_window: { type: array, items: { type: integer }, example: [9, 18] }
        active_script_id: { type: string, format: uuid }
        filters: { type: object }

    Script:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string, enum: [approach, objection, education, closing, follow_up, referral, reactivation] }
        target_profession: { $ref: '#/components/schemas/Profession' }
        status: { type: string, enum: [draft, active, archived] }
        response_rate: { type: number }
        conversion_rate: { type: number }
        total_usages: { type: integer }

    ScriptDetail:
      allOf:
        - $ref: '#/components/schemas/Script'
        - type: object
          properties:
            flow: { type: object }
            base_message: { type: string }
            variables: { type: array, items: { type: string } }
            variations:
              type: array
              items:
                type: object
                properties:
                  variant_letter: { type: string }
                  message: { type: string }
                  response_rate: { type: number }

    ScriptTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        segment: { type: string }
        category: { type: string }
        target_profession: { $ref: '#/components/schemas/Profession' }
        popularity: { type: integer }

    LeadEvent:
      type: object
      properties:
        event_type: { type: string }
        payload: { type: object }
        created_at: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    NotificationChannel:
      type: string
      enum: [PUSH, WHATSAPP, EMAIL, SMS]

    NotificationPreference:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        eventType: { type: string }
        channels:
          type: array
          items: { $ref: '#/components/schemas/NotificationChannel' }
        enabled: { type: boolean }
        updatedAt: { type: string, format: date-time }

    EvolutionInboundPayload:
      type: object
      description: Webhook `messages.upsert` da Evolution API
      properties:
        event: { type: string, example: 'messages.upsert' }
        instance: { type: string, example: 'tenant_giovane' }
        data:
          type: object
          properties:
            key:
              type: object
              properties:
                remoteJid: { type: string, example: '5517998764422@s.whatsapp.net' }
                fromMe: { type: boolean }
                id: { type: string }
            pushName: { type: string }
            message:
              type: object
              properties:
                conversation: { type: string, nullable: true }
                extendedTextMessage:
                  type: object
                  properties:
                    text: { type: string }
            messageTimestamp: { type: integer }

    LgpdRequest:
      type: object
      description: Solicitação de direito do titular LGPD (art. 18)
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [EXPORT_DATA, DELETE_TENANT_DATA, DELETE_LEAD_DATA, CORRECT_DATA, CONFIRM_DATA]
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, REJECTED, CANCELED]
        scope:
          type: object
          nullable: true
          additionalProperties: true
        downloadUrl: { type: string, nullable: true, description: 'R2 presigned URL · só presente quando status=COMPLETED' }
        downloadExpiresAt: { type: string, format: date-time, nullable: true }
        rejectionReason: { type: string, nullable: true }
        processedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        code:
          type: string
          pattern: '^PRSPX-[A-Z0-9]{4}-[A-Z0-9]{4}$'
          example: 'PRSPX-A8K2-9F4M'
        tenant_id: { type: string, format: uuid }
        role: { type: string, enum: [OWNER, ASSISTANT] }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        used_at: { type: string, format: date-time, nullable: true }
        used_by_user_id: { type: string, format: uuid, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        status:
          type: string
          enum: [active, used, expired, revoked]
          description: Status derivado dos timestamps

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - UNAUTHENTICATED
                - UNAUTHORIZED
                - RESOURCE_NOT_FOUND
                - VALIDATION_ERROR
                - RATE_LIMITED
                - TENANT_QUOTA_EXCEEDED
                - INVITATION_INVALID
                - INVITATION_EXPIRED
                - INVITATION_ALREADY_USED
                - EXTERNAL_SERVICE_DOWN
                - INTERNAL_ERROR
            message: { type: string }
            details: { type: object, additionalProperties: true }
            trace_id: { type: string, nullable: true }
        meta:
          type: object
          properties:
            request_id: { type: string }
            timestamp: { type: string, format: date-time }
